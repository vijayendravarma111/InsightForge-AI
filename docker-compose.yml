version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: insightforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightforge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: insightforge-backend
    volumes:
      - ./backend:/backend
      - /backend/.venv
      - backend-store:/backend/data_store
    ports:
      - "8080:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=insightforge
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: insightforge-frontend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  pgdata:
  backend-store:
